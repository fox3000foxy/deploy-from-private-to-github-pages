name: Deploy from private to GitHub Pages
description: Deploys a build artifact or dist folder to a GitHub Pages repository branch.
author: Fox3000Foxy <fox3000foxy@gmail.com>
branding:
  icon: 'activity'
  color: 'green'

inputs:
  repo:
    description: 'Target repository for Pages deployment'
    required: false
    default: ''
  branch:
    description: 'Target branch for deployment on the pages repo'
    required: false
    default: 'deploy'
  artifact:
    description: 'ID of build artifact to fetch from previous job'
    required: false
    default: ''
  token:
    description: 'Token used to clone/push the target repository (PAT or GitHub App token recommended for cross-repo deployment)'
    required: false
    default: ''

runs:
  using: 'node16'
  main: 'dist/index.js'  # bundle produced by `npm run build`